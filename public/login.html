<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jadwal Sidang Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: url('img/bglogin.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #111827;
        }

        .login-card {
            background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 60%),
                radial-gradient(circle at bottom right, rgba(29, 78, 216, 0.1), transparent 60%),
                rgba(10, 15, 28, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 18px;
            width: 100%;
            max-width: 350px;
            padding: 35px 30px;
            border: 1.6px solid rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.2),
                inset 0 0 20px rgba(59, 130, 246, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 80%);
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #F8FAFC;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            font-size: 0.8rem;
            color: #94A3B8;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            color: #CBD5E1;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.7rem;
            color: #F8FAFC;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-field::placeholder {
            color: #9CA3AF;
        }

        .btn-primary {
            width: 100%;
            background: #0A0F1C;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1.6px solid transparent;
            background-image: linear-gradient(#0A0F1C, #0A0F1C),
                linear-gradient(90deg, #3B82F6, #2DD4BF, #3B82F6);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 100% 100%, 200% 100%;
            animation: flow 3s linear infinite;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
            letter-spacing: 0.02em;
        }

        @keyframes flow {
            0% {
                background-position: 0% 0%, 0% 0%;
            }

            100% {
                background-position: 0% 0%, 200% 0%;
            }
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            animation-duration: 1.5s;
            background-image: linear-gradient(135deg, #131d36),
                linear-gradient(90deg, #3B82F6, #2DD4BF, #3B82F6);
        }

        .btn-primary:active {
            opacity: 0.9;
        }

        .footer-text {
            margin-top: 25px;
            text-align: center;
            font-size: 0.5rem;
            color: #94A3B8;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0.7;
        }



        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #6B7280;
        }

        #login-error {
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(220, 38, 38, 0.2);
            color: #FCA5A5;
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-card animate-fade-in">
        <div class="logo-container">
            <img src="img/logosidang.png" alt="Logo"
                style="filter: brightness(0) saturate(100%) invert(48%) sepia(89%) saturate(2476%) hue-rotate(190deg) brightness(101%) contrast(101%);">
        </div>
        <h1>Selamat Datang</h1>
        <p class="subtitle">Aplikasi Jadwal Sidang <br>Pengadilan Negeri Gunung Sugih</p>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="input-field" placeholder="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="relative">
                    <input type="password" id="password" class="input-field" placeholder="password" required>
                    <button type="button" onclick="togglePassword('password', this)" class="password-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary">
                Login
            </button>
        </form>

        <div id="login-error" class="hidden">
            Username atau password salah!
        </div>

        <div class="footer-text">
            v2.0 • Developed by Apriprogram
        </div>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const svg = btn.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
            } else {
                input.type = 'password';
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                const user = users.find(user => user.username === u && user.password === p);

                if (user) {
                    if (user.status === 'Inactive') {
                        const err = document.getElementById('login-error');
                        err.textContent = 'Akun Anda dinonaktifkan. Silakan hubungi admin.';
                        err.classList.remove('hidden');
                        setTimeout(() => err.classList.add('hidden'), 5000);
                        return;
                    }
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUsername', user.username);
                    window.location.href = 'index.html';
                } else {
                    const err = document.getElementById('login-error');
                    err.textContent = 'Username atau password salah!';
                    err.classList.remove('hidden');
                    setTimeout(() => err.classList.add('hidden'), 3000);
                }
            } catch (err) {
                console.error("Login failed", err);
            }
        });

        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
